apiVersion: v1
kind: Service
metadata:
  name: {{ include "excalidash.frontendServiceName" . }}
  labels:
    {{- include "excalidash.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
    {{- with .Values.frontend.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "excalidash.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: {{ ternary "combined" "frontend" .Values.singleDeployment }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 80
      protocol: TCP
