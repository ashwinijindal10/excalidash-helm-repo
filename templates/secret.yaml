{{- if .Values.secret.create }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "excalidash.secretName" .) -}}
{{- $existingData := dig "data" dict $existing -}}
{{- $jwtExisting := index $existingData "JWT_SECRET" | default "" -}}
{{- $csrfExisting := index $existingData "CSRF_SECRET" | default "" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "excalidash.secretName" . }}
  labels:
    {{- include "excalidash.labels" . | nindent 4 }}
    {{- with .Values.secret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.secret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  JWT_SECRET: {{ default (default (randAlphaNum 48) ($jwtExisting | b64dec)) .Values.secret.stringData.JWT_SECRET | b64enc | quote }}
  CSRF_SECRET: {{ default (default (randAlphaNum 48) ($csrfExisting | b64dec)) .Values.secret.stringData.CSRF_SECRET | b64enc | quote }}
  {{- range $key, $value := .Values.secret.extraStringData }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
