{{- if not (kindIs "bool" .Values.singleDeployment) -}}
{{- fail "Values.singleDeployment must be true or false." -}}
{{- end -}}

{{- if and .Values.singleDeployment (gt (int .Values.combined.replicaCount) 1) (not .Values.unsafe.allowMultipleBackendReplicas) -}}
{{- fail "combined.replicaCount > 1 is blocked by default because ExcaliDash backend state is not horizontally safe. Set unsafe.allowMultipleBackendReplicas=true if you really want this." -}}
{{- end -}}

{{- if and (not .Values.singleDeployment) (gt (int .Values.backend.replicaCount) 1) (not .Values.unsafe.allowMultipleBackendReplicas) -}}
{{- fail "backend.replicaCount > 1 is blocked by default because upstream ExcaliDash does not recommend multiple backend replicas. Set unsafe.allowMultipleBackendReplicas=true if you really want this." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}
